<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Page</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(to bottom,#f5a3b3,#f2b6a3);
    font-family:Arial;
    overflow:hidden;
}

h1{
    color:#7a2e40;
}

#stickerArea{
    position:relative;
    width:90%;
    height:70vh;
}

.sticker{
    position:absolute;
    width:120px;
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#ff6b81;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>Still angry? 🥺👉👈</h1>

<button onclick="addSticker()">Click if still angry</button>

<div id="stickerArea"></div>

<script>

const stickers = [
"https://media.tenor.com/1.gif",
"https://media.tenor.com/2.gif",
"https://media.tenor.com/3.gif",
"https://media.tenor.com/4.gif",
"https://media.tenor.com/5.gif",
"https://media.tenor.com/6.gif",
"https://media.tenor.com/7.gif",
"https://media.tenor.com/8.gif",
"https://media.tenor.com/9.gif",
"https://media.tenor.com/10.gif"
];

let clickCount = 0;

function addSticker(){

    if(clickCount >= 10){
        alert("Okay okay 😭 I said sorry enough times");
        return;
    }

    const img = document.createElement("img");

    img.src = stickers[clickCount];
    img.className = "sticker";

    const area = document.getElementById("stickerArea");

    const x = Math.random() * (area.clientWidth - 120);
    const y = Math.random() * (area.clientHeight - 120);

    img.style.left = x + "px";
    img.style.top = y + "px";

    area.appendChild(img);

    clickCount++;
}

</script>

</body>
</html>
