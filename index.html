<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff9ec4,#ffd1dc,#ffc3a0);
color:#7a2a4d;
}

.container{
margin-top:80px;
}

h1{
font-size:40px;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:25px;
cursor:pointer;
margin:15px;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#6c63ff;
color:white;
}

img{
width:220px;
border-radius:20px;
margin-top:30px;
}

#apology{
display:none;
max-width:700px;
margin:40px auto;
font-size:20px;
line-height:1.6;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

</style>
</head>

<body>

<div class="container">

<h1 id="question">Still angry? 🥺👉👈</h1>

<img id="sticker" src="1.gif">

<br>

<button id="yes" onclick="stillAngry()">Yes</button>
<button id="no" onclick="forgive()">No</button>

</div>

<div id="apology">

<h2>Yay ❤️ She forgave me</h2>

<p>I know I might have hurt you and I'm really sorry.</p>
<p>You mean a lot to me and I never want to make you sad.</p>
<p>I promise to do better and make you smile again.</p>

<p><strong>Forever yours ❤️</strong></p>

</div>

<script>

let count = 1;

function stillAngry(){

count++;

if(count > 8){
count = 1;
}

document.getElementById("sticker").src = count + ".gif";

if(count >= 10){
document.getElementById("question").innerText =
"I deserve this but I'm really sorry 😭";
}
else if(count >= 5){
document.getElementById("question").innerText =
"Okay okay I get it you're angry 🥲";
}
else{
document.getElementById("question").innerText =
"Still angry? 🥺👉👈";
}

}

function forgive(){

document.querySelector(".container").style.display = "none";
document.getElementById("apology").style.display = "block";

}

</script>

</body>
</html>
