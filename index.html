<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>I'm Sorry ❤️</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9ec4,#ffd1dc,#ffc3a0);
margin-top:80px;
}

h1{
font-size:40px;
color:#7a2a4d;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:25px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#6c63ff;
color:white;
}

img{
width:220px;
margin-top:30px;
border-radius:20px;
}

#apology{
display:none;
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
}

</style>

</head>

<body>

<h1 id="text">Still angry? 🥺👉👈</h1>

<img id="gif" src="1.gif">

<br>

<button onclick="nextGif()" id="yes">Yes</button>
<button onclick="forgive()" id="no">No</button>

<div id="apology">

<h2>Yay ❤️ She forgave me</h2>

<p>I know I might have hurt you and I'm really sorry.</p>
<p>You mean a lot to me and I never want to make you sad.</p>
<p>I promise to be better and make you smile again.</p>

<p><b>Forever yours ❤️</b></p>

</div>

<script>

let clickCount = 0;

function nextGif(){

clickCount++;

let number = (clickCount % 8) + 1;

document.getElementById("gif").src = number + ".gif";

if(clickCount >= 10){
document.getElementById("text").innerText =
"I deserve this but I'm really sorry 😭";
}
else if(clickCount >= 5){
document.getElementById("text").innerText =
"Okay okay I get it you're angry 🥲";
}

}

function forgive(){

document.getElementById("apology").style.display="block";

}

</script>

</body>
</html>
